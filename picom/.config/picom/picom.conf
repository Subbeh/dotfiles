# general settings
backend = "glx";

# opacity
active-opacity = 1;
inactive-opacity = 0.8;
frame-opacity = 1;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'Polybar'",
  "100:class_g = 'firefox'",
  "100:class_g = 'dmenu'",
  "100:class_g = 'Rofi'",
  "100:class_g = 'scrot'",
  "100:class_g = 'Dunst'",
  "85:class_g = 'URxvt'"
];

opacity-exclude = [
  "class_g = 'firefox'",
];

# blur
blur: {
  method = "dual_kawase";
  strength = 8;
  background = true;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
};

# corner
corner-radius = 10.0;
detect-rounded-corners = true;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Dmenu'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];

# shadows
shadow               = true;
shadow-radius        = 10;
shadow-offset-x      = -5;
shadow-offset-y      = -5;
shadow-opacity       = 0.6;
shadow-exclude = [
	"name = 'Notification'",
	"class_g = 'Conky'",
	"class_g ?= 'Notify-osd'",
	"class_g = 'Polybar'",
  "class_g = 'Dmenu'",
  "class_g = 'scrot'",
	"_GTK_FRAME_EXTENTS@:c"
];

wintypes:
{
  dock = { shadow = false; };
  dnd = { shadow = false; };
  tooltip = { shadow = false; };
  menu        = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
  popup_menu    = { opacity = 1.0; };
  utility       = { opacity = 1.0; };
};
