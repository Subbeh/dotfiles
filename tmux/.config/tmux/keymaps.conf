# vi: ft=tmux
###########################################################################
# key mappings
unbind C-b
bind -N "Send prefix to nested session" C-s send-prefix

bind -N "Toggle status line" F2 set status

bind -N "Reload tmux config" r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded tmux config'
bind -N "Toggle synchronize-panes" C-a setw synchronize-panes
bind -N "Kill pane" x kill-pane
bind -N "Kill window" C-x kill-window
bind -N "Tmuxinator sessions" -r s run __tmuxinator_sessions
bind -N "Jpro session manager" -r i run __tmux_jpro_session_manager
bind -N "Change directory" -r A run cda

bind -N "Select pane left" h select-pane -L
bind -N "Select pane down" j select-pane -D
bind -N "Select pane up" k select-pane -U
bind -N "Select pane right" l select-pane -R

bind -N "Split horizontal (keep path)" \\ split-window -h -c "#{pane_current_path}"
bind -N "Split vertical (keep path)" - split-window -v -c "#{pane_current_path}"
bind -N "Split horizontal" | split-window -h
bind -N "Split vertical" _ split-window -v

bind -N "Next window" -r C-l select-window -t :+
bind -N "Previous window" -r C-h select-window -t :-

bind -N "Join pane from window" @ choose-window 'join-pane -h -s "%%"'

bind -N "Resize pane left" -r H resize-pane -L 2
bind -N "Resize pane down" -r J resize-pane -D 2
bind -N "Resize pane up" -r K resize-pane -U 2
bind -N "Resize pane right" -r L resize-pane -R 2

bind -N "Last session" -r Space switch-client -l
bind -N "Last window" -r C-Space last-window
bind -N "Swap window left" -r , swap-window -t :-1
bind -N "Swap window right" -r . swap-window -t :+1

bind -N "Search backward in copy mode" f copy-mode \; send-keys ?

bind -N "Move window to position 1" '!' if 'tmux swapw -d -t :=1' '' 'movew -t :=1'
bind -N "Move window to position 2" '@' if 'tmux swapw -d -t :=2' '' 'movew -t :=2'
bind -N "Move window to position 3" '#' if 'tmux swapw -d -t :=3' '' 'movew -t :=3'
bind -N "Move window to position 4" '$' if 'tmux swapw -d -t :=4' '' 'movew -t :=4'
bind -N "Move window to position 5" '%' if 'tmux swapw -d -t :=5' '' 'movew -t :=5'
bind -N "Move window to position 6" '^' if 'tmux swapw -d -t :=6' '' 'movew -t :=6'
bind -N "Move window to position 7" '&' if 'tmux swapw -d -t :=7' '' 'movew -t :=7'
bind -N "Move window to position 8" '*' if 'tmux swapw -d -t :=8' '' 'movew -t :=8'
bind -N "Move window to position 9" '(' if 'tmux swapw -d -t :=9' '' 'movew -t :=9'
bind -N "Move window to position 0" ')' if 'tmux swapw -d -t :=0' '' 'movew -t :=0'

###########################################################################
# vim integration
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -N "Select pane left (vim-aware)" -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -N "Select pane down (vim-aware)" -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -N "Select pane up (vim-aware)" -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -N "Select pane right (vim-aware)" -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# copy-mode (vi)
setw -g mode-keys vi
bind -N "Enter copy mode" Escape copy-mode
bind -N "Begin selection" -T copy-mode-vi v send -X begin-selection
bind -N "Yank selection" -T copy-mode-vi y \
  send -X copy-selection-no-clear \;\
  run-shell -b "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy || pbcopy)" \;\
  send-keys Escape
bind -N "Yank mouse selection" -T copy-mode-vi MouseDragEnd1Pane \
  send -X copy-selection-no-clear \;\
  run-shell -b "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy || pbcopy)" \;\
  send-keys Escape
unbind p
bind -N "Paste buffer" p paste-buffer
bind -N "Paste from clipboard" C-v run "if command -v wl-paste >/dev/null 2>&1; then tmux set-buffer \"$(wl-paste)\"; else tmux set-buffer \"$(pbpaste)\"; fi; tmux paste-buffer"

bind-key -N "Select pane left" -T copy-mode-vi 'C-h' select-pane -L
bind-key -N "Select pane down" -T copy-mode-vi 'C-j' select-pane -D
bind-key -N "Select pane up" -T copy-mode-vi 'C-k' select-pane -U
bind-key -N "Select pane right" -T copy-mode-vi 'C-l' select-pane -R

bind-key -N "Reset layout" = \
  resize-pane -t1 -x25% \;\
  resize-pane -t1 -y80% \;\
  resize-pane -t3 -y80%
bind-key -N "Recreate layout" + \
  kill-pane -a \;\
  split-window -h -c "#{pane_current_path}" \;\
  split-window -v -c "#{pane_current_path}" \;\
  select-pane -L \;\
  split-window -v -c "#{pane_current_path}" \;\
  resize-pane -t1 -x25% \;\
  resize-pane -t1 -y80% \;\
  resize-pane -t3 -y80%

