###########################################################################
# init
run-shell 'tmux set-environment -g TMUX_CONF_DIR "$HOME/.config/tmux"'
run-shell 'echo "Loading tmux configuration..." >> /tmp/tmux_startup.log'

###########################################################################
# source config files
source-file ~/.config/tmux/env.conf
source-file ~/.config/tmux/plugins.conf
source-file ~/.config/tmux/keymaps.conf
source-file ~/.config/tmux/theme.conf

###########################################################################
# tpack
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

if-shell "! command -v tpack >/dev/null 2>&1" {
  display-message 'Installing tpack...'
  if-shell "test $(uname) = Darwin" {
    run 'brew install --quiet --force tmuxpack/tpack/tpack'
  }
  if-shell "test -f /etc/arch-release" {
    run 'yay -S --noconfirm tpack-bin'
  }
  run 'tpack install'
}

run "tpack init"
