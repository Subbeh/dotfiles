[module/date]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/date.sh
tail = true
scroll-up = kill -USR1 %pid%
scroll-down = kill -USR2 %pid%
format = <label>
label-background = ${color.bar-light}
label-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/nordvpn]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/nordvpn.sh
click-left = kill -USR1 %pid%
click-right = notify-send "NordVPN Status" "$(nordvpn status)"
tail = true
format = <label>
;format-padding = 1
format-background = ${color.bar-light}
format-foreground = ${color.fg}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/kbd_backlight]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/kbd_backlight.sh
click-left = kill -USR1 %pid%
tail = true
format = <label>
format-background = ${color.bar-light}
format-foreground = ${color.fg}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/lifx]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/lifx.sh
click-left = echo toggle > /tmp/lifx.pipe
scroll-up = echo up > /tmp/lifx.pipe
scroll-down = echo down > /tmp/lifx.pipe
tail = true
format = <label>
label-background = ${color.bar-light}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/pomodoro]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/pomodoro.sh
click-right = echo notify > /tmp/pomodoro.pipe &
click-left = echo toggle > /tmp/pomodoro.pipe &
click-middle = echo reset > /tmp/pomodoro.pipe &
tail = true
format = <label>
;label-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/sensors]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/sensors.sh
tail = true
format = <label>
content-border = 2
format-prefix = 
format-padding = 1
;format-background = ${color.bar-light}
format-foreground = ${color.fg}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/sysmenu]
type = custom/text
content =  
format = <label>
content-padding = 1
content-background = ${color.bar-light}
content-foreground = ${color.pink}

click-left = rofi-power-menu &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/pulseaudio-control]
type = custom/script
tail = true
label-padding = 1
format-background = ${color.bar-light}
format-foreground = ${color.fg}

# Icons mixed from Font Awesome 5 and Material Icons
# You can copy-paste your options for each possible action, which is more
# trouble-free but repetitive, or apply only the relevant ones (for example
# --sink-blacklist is only needed for next-sink).
exec = ~/.config/polybar/scripts/pulseaudio-control.sh --icons-volume " , " --icon-muted " " --sink-nicknames-from "device.description" --sink-nickname "alsa_output.usb-Sennheiser_Sennheiser_SC60_for_Lync_0000000000-00.analog-stereo: " --sink-nickname "alsa_output.pci-0000_00_1f.3.analog-stereo:" --sink-nickname "bluez_sink.00_42_79_B0_89_F3.a2dp_sink:" listen
click-right = exec pavucontrol &
click-left = ~/.config/polybar/scripts/pulseaudio-control.sh togmute
click-middle = ~/.config/polybar/scripts/pulseaudio-control.sh next-sink
scroll-up = ~/.config/polybar/scripts/pulseaudio-control.sh --volume-max 130 up
scroll-down = ~/.config/polybar/scripts/pulseaudio-control.sh --volume-max 130 down

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/scripts/bluetooth.sh
tail = true
click-left = ~/.config/polybar/scripts/bluetooth.sh --toggle &
format = <label>
;format-padding = 1
;format-background = ${color.bar-light}
;format-foreground = ${color.fg}

;A
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/checknet]
type = custom/script
exec = $XDG_CONFIG_HOME/polybar/scripts/checknet.sh
tail = true
format = <label>
format-foreground = ${color.fg}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/dot-status]
type = custom/script
exec = $DOT/dot status -s | wc -l
interval = 60
format = <label>
format-prefix = " "

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/updates]
type = custom/script

; Available tokens:
;   %counter%
; Command to be executed (using "/usr/bin/env sh -c [command]")
exec = ~/.config/polybar/scripts/updates.sh

; Conditional command that, if defined, needs to exit successfully
; before the main exec command is invoked.
; Default: ""
;;exec-if = ""

; Will the script output continous content?
; Default: false
tail = true

; Seconds to sleep between updates
; Default: 2 (0 if `tail = true`)
;interval = 5

; Available tags:
;   <output> - deprecated
;   <label> (default)
format = <label>
format-prefix = 

; Available tokens:
;   %output%
; Default: %output%
label = %output%

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/spotify]
type = custom/script
tail = true
; prefix symbol is shown before the text
format-prefix = " "
format = <label>
exec = ~/.config/polybar/scripts/spotify/scroll_spotify_status.sh

[module/spotify-prev]
type = custom/script
exec = echo ""
format = <label>
click-left = playerctl --player=spotify previous

[module/spotify-play-pause]
type = custom/ipc
hook-0 = echo ""
hook-1 = echo ""
initial = 1
click-left = playerctl --player=spotify play-pause

[module/spotify-next]
type = custom/script
exec = echo ""
format = <label>
click-left = playerctl --player=spotify next
label-padding-right = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/crypto]
type = custom/script
interval = 60
format-padding = 1
exec = ~/.config/polybar/scripts/crypto.py
