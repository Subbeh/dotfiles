[global/wm]

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[bar/main]
;bottom = false
;fixed-center = true

width = 100%

background = #00
foreground = ${color.grey}

font-0 = Misc Tamzen:14;1
font-1 = Wuncon Siji:size=12;1

;dim-value = 1.0
line-size = 2
line-color = ${color.blue}


;module-margin-right = 1

;border-color = ${color.bar}


[bar/top]
inherit = bar/main
height = 22
;border-size = 1
overline-color = ${color.blue}
module-margin = 0
border-bottom-color = ${color.blue}
;border-bottom-size = 2
modules-left = bspwm sep title 
modules-center = date
modules-right = spotify spotify-prev spotify-play-pause spotify-next sep bluetooth sep pulseaudio-control sep nordvpn sep kbd_backlight sep lifx sep backlight powermenu

[bar/bottom]
inherit = bar/main
height = 17
bottom = true
background = #00
module-margin-right = 1
;border-top-size = 2
border-top-color = ${color.blue}
;overline-size = 2
overline-color = #f00
underline-size = 2
underline-color = #00f
modules-left = sensors
modules-center = checknet updates dot-status cpu memory battery
modules-right = 

[settings]
override-redirect = true
wm-restack = bspwm
enable-ipc = true
screenchange-reload = true
