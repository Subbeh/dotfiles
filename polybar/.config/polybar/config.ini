[global/wm]

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/modules_custom.ini

[bar/main]
bottom = false
fixed-center = true

width = 100%
height = 17 

background = ${color.bar}
foreground = ${color.fg}

font-0 = Misc Tamzen:14;2
font-1 = Wuncon Siji:size=12;2

dim-value = 1.0

module-margin-right = 1

border-color = ${color.bar}

wm-restack = bspwm

enable-ipc = true

[bar/top]
inherit = bar/main
border-size = 3
modules-left = bspwm title
modules-center = date pomodoro
modules-right = spotify spotify-prev spotify-play-pause spotify-next nordvpn bluetooth kbd_backlight lifx pulseaudio-control backlight sysmenu

[bar/bottom]
inherit = bar/main
bottom = true
border-top-size = 2
border-top-color = ${color.blue}
overline-size = 2
overline-color = #f00
underline-size = 2
underline-color = #00f
modules-left = sensors
modules-center = checknet updates cpu memory battery
modules-right = 
