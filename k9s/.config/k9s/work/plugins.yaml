---
plugins:
  troubleshoot:
    shortCut: Shift-T
    description: "(Atlas) Troubleshoot"
    override: true
    scopes:
      - po
    command: bash
    background: true
    confirm: true
    args:
      - -c
      - "hermes jpro actions troubleshoot $(echo $NAMESPACE | sed 's/-.*//')"
  elevate:
    shortCut: Shift-E
    description: "(Atlas) Elevate"
    override: true
    scopes:
      - po
    command: bash
    background: true
    confirm: true
    args:
      - -c
      - "hermes jpro database elevate $(echo $NAMESPACE | sed 's/-.*//')"
  roll:
    shortCut: Shift-R
    description: "(Atlas) Roll"
    override: true
    scopes:
      - po
    command: bash
    background: true
    dangerous: true
    confirm: true
    args:
      - -c
      - "hermes jpro actions roll $(echo $NAMESPACE | sed 's/-.*//')"
  bash-shell:
    description: "(Atlas) Shell"
    shortCut: Shift-S
    override: true
    scopes:
      - po
    command: bash
    background: false
    args:
      - -c
      - "kubectl exec -ti $NAME -- /bin/bash"
  logstream-logs:
    description: "(Logstream) Logs"
    shortCut: Shift-L
    override: true
    scopes:
      - po
    command: bash
    background: false
    args:
      - -c
      - "kubectl logs -l app.kubernetes.io/name=fluentd -n logging | grep $(echo $NAMESPACE | sed 's/-.*//') | less -RK"
  logstream-configcheck:
    description: "(Logstream) ConfigCheck"
    shortCut: Shift-C
    override: true
    scopes:
      - po
    command: bash
    background: false
    args:
      - -c
      - "kubectl logs $(kubectl get pods -n logging --no-headers -o custom-columns=':metadata.name' | grep -m 1 '^logging-operator-fluentd-configcheck-') -n logging | grep -C1 $(echo $NAMESPACE | sed 's/-.*//') | less -RK"
  kill:
    description: "Kill pod"
    shortCut: Shift-D
    override: true
    confirm: true
    scopes:
      - po
    command: bash
    background: false
    args:
      - -c
      - "kubectl delete pod $NAME --force"
  clear:
    description: "Clear failed pods"
    shortCut: Shift-C
    override: true
    confirm: true
    scopes:
      - po
    command: bash
    background: false
    args:
      - -c
      - "kubectl delete pods --field-selector=status.phase=Failed"
