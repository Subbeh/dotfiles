# Statemate configuration
# See: https://github.com/subbeh/statemate

# Source directories to manage (stow-style)
# Each directory's contents are deployed relative to target_base
# Example: sources: [nvim, zsh, git] will look for nvim/, zsh/, git/ in this directory

# Default target for deployed files (default: $HOME)
target_base: "~"

# Template variables
variables:
  email: "steven001@gmail.com"
  authorizedSshKeys:
    - laptop-personal-ssh-key
    - laptop-work-ssh-key

include:
  - .packages/system.yaml

sources:
  - atuin
  - bitwarden
  - claude
  - env
  - fd
  - fzf
  - git
  - gnupg
  - k9s
  - kitty
  - statemate
  - nvim
  - ripgrep
  - ssh
  - starship
  - task
  - tmux
  - vifm
  - vivid
  - yazi
  - zsh

# Profiles for machine-specific configuration
profiles:
  macos:
    detection:
      os: darwin
    sources:
      - macos
      - karabiner
  work:
    extends: macos
    detection:
      user: steven.terwindt
    sources:
      - aws
      - syncthing
      - work
    variables:
      email: "steven.terwindt@jamf.com"
      sshKeys:
        - laptop-work-ssh-key
        - github-ssh-key
        - home-ops-ssh-key
  linux:
    detection:
      os: linux
  arch:
    extends: linux
    detection:
      command: "test -f /etc/arch-release"
    sources:
      - arch_root
      - firefox
      - hyprland
      - infra
      - syncthing
    variables:
      sshKeys:
        - laptop-personal-ssh-key
        - github-ssh-key
        - home-ops-ssh-key

# Age encryption for sensitive files
age:
  identity: "~/.config/statemate/key.txt"
  recipients:
    - age14lue9m7wkjynpke4290yjnk36ztm6fdvj65dhudprc4rj8yajgxqxawmnf
