# Statemate configuration
# See: https://github.com/subbeh/statemate

# Default target for deployed files (default: $HOME)
target_base: "~"

variables:
  authorizedSshKeys:
    - laptop-personal-ssh-key
    - laptop-work-ssh-key

sources:
  - env

ignore:
  - "*.md"

# Profiles for machine-specific configuration
profiles:
  linux:
    detection:
      os: linux
  personal:
    extends: linux
    detection:
      command: "test -f /etc/arch-release"
    sources:
      - arch
      - bitwarden
      - eza
      - fd
      - git
      - gnupg
      - hyprland
      - kitty
      - ripgrep
      - ssh
      - starship
      - statemate
      - zsh
    variables:
      sshKeys:
        - laptop-personal-ssh-key
        - github-ssh-key
        - home-ops-ssh-key

# Age encryption for sensitive files
age:
  identity: "~/.config/statemate/key.txt"
  recipients:
    - age14lue9m7wkjynpke4290yjnk36ztm6fdvj65dhudprc4rj8yajgxqxawmnf
