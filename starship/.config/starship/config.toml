"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
continuation_prompt = '[❯❯](dimmed white) '
command_timeout = 1000

format = """
${custom.user}\
$hostname\
$directory\
${custom.direnv}\
${custom.mise}\
${custom.upterm}\
$character\
"""

right_format = """
$cmd_duration\
${custom.hermes}\
${custom.k8shome}\
$sudo\
$jobs\
$git_branch\
$git_state\
$golang\
$python\
"""

[custom.user]
command = 'echo $USER'
when = ''' test "$USER" != "sysadm" && test "$USER" != "steven.terwindt" '''
format = '[$output ](bold green)'

[hostname]
ssh_symbol = '\[\] '
style = 'bright-blue'
format = '[$ssh_symbol$hostname]($style)[ ❯](bold purple) '

[directory]
truncate_to_repo = false
truncation_length = 8
truncation_symbol = '+/'
style = 'bold bright-blue'
format = '[$truncation_symbol](bold bright-purple)[$path](bold bright-blue)[$read_only]($read_only_style) '
read_only = ' 󰌾'

[directory.substitutions]
'~/.config/' = '[] '
'~/.config' = '[]'
'~/workspace/dotfiles/' = '[󰇘] '
'~/workspace/dotfiles' = '[󰇘]'
'~/workspace/' = '[󱧽] '
'~/workspace' = '[󱧽]'
'~/' = '[] '
'~' = '[]'
'/data/workspace/dotfiles/' = '[󰇘] '
'/data/workspace/dotfiles' = '[󰇘]'
'/data/workspace/' = '[󱧽] '
'/data/workspace' = '[󱧽]'
'/data/' = '[] '
'/data' = '[]'

[character]
success_symbol = '[❯](bold purple)'
error_symbol = '[❯](bold red)'

[cmd_duration]
format = '[[󰔟](bold yellow) $duration ](dimmed white)'

[git_branch]
format = '[[$symbol](bold cyan) $branch(:$remote_branch)](dimmed white) '
symbol = ""

[git_status]
style = 'dimmed white'
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'
deleted = 'x'

[aws]
format = '[[$symbol](bold bright-blue) $profile](dimmed white) '
style = 'bold blue'
symbol = ''

[golang]
format = '[ ](sapphire)'

[python]
format = '[[](bold yellow) $virtualenv](dimmed white) '

[kubernetes]
symbol = ''
disabled = false
detect_env_vars = ['KUBECONFIG']
detect_files = ['dummy']
format = '[[$symbol](bold bright-blue)$namespace](dimmed white) '

[custom.direnv]
command = 'echo '
when = ''' test -n "$DIRENV_DIR" '''
format = '[$output ](bold green)'

[custom.mise]
command = 'echo '
when = ''' test -n "$MISE_ENV" '''
format = '[$output ](bold green)'

[custom.upterm]
when = ''' test -n "$UPTERM_ADMIN_SOCKET" '''
format = '[[](bold red) upterm](bold blue) '

[custom.hermes]
command = 'echo $INST'
symbol = '󱃾'
when = ''' test -n "$INST" '''
format = '[$symbol ](bold blue)[$output ](dimmed white)'

[custom.k8shome]
command = ''' kubectl config view --minify --output 'jsonpath={..namespace}' '''
symbol = '󱃾'
when = ''' [ "$KUBECONFIG" = "$HOMELAB_DIR/.secret/kubeconfig" ] '''
format = '[$symbol ](bold blue)[$output ](dimmed white)'
