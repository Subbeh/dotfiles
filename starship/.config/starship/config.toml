"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
continuation_prompt = '[ÔØ»ÔØ»](dimmed white) '
command_timeout = 1000

format = """
$hostname\
$directory\
${custom.direnv}\
${custom.mise}\
${custom.upterm}\
$character\
"""

right_format = """
$cmd_duration\
${custom.hermes}\
${custom.k8shome}\
$sudo\
$jobs\
$git_branch\
$git_state\
$golang\
$python\
"""

[directory]
truncate_to_repo = false
truncation_length = 8
truncation_symbol = '+/'
style = 'bold bright-blue'
format = '[$truncation_symbol](bold bright-purple)[$path](bold bright-blue)[$read_only]($read_only_style) '
read_only = ' ¾░î¥'

[directory.substitutions]
'~/.config/' = '[¯İò] '
'~/.config' = '[¯İò]'
'~/workspace/chezmoi/dotfiles/' = '[¾░çİ] '
'~/workspace/chezmoi/dotfiles' = '[¾░çİ]'
'~/workspace/' = '[¾▒ğ¢] '
'~/workspace' = '[¾▒ğ¢]'
'~/' = '[´Çò] '
'~' = '[´Çò]'
'/data/workspace/chezmoi/dotfiles/' = '[¾░çİ] '
'/data/workspace/chezmoi/dotfiles' = '[¾░çİ]'
'/data/workspace/' = '[¾▒ğ¢] '
'/data/workspace' = '[¾▒ğ¢]'
'/data/' = '[´æ▓] '
'/data' = '[´æ▓]'

[character]
success_symbol = '[ÔØ»](bold purple)'
error_symbol = '[ÔØ»](bold red)'

[cmd_duration]
format = '[[¾░öş](bold yellow) $duration ](dimmed white)'

[git_branch]
format = '[[$symbol](bold cyan) $branch(:$remote_branch)](dimmed white) '
symbol = "´Éİ"

[git_status]
style = 'dimmed white'
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count}Ôçú${behind_count}'
behind = 'Ôçú${count}'
deleted = 'x'

[aws]
format = '[[$symbol](bold bright-blue) $profile](dimmed white) '
style = 'bold blue'
symbol = '´âé'

[golang]
format = '[¯İğ ](sapphire)'

[hostname]
ssh_symbol = '\[¯¼ü\] '
style = 'bright-blue'
format = '[$ssh_symbol$hostname]($style)[ ÔØ»](bold purple) '

[python]
format = '[[¯êÁ](bold yellow) $virtualenv](dimmed white) '

[kubernetes]
symbol = '¯áØ'
disabled = false
detect_env_vars = ['KUBECONFIG']
detect_files = ['dummy']
format = '[[$symbol](bold bright-blue)$namespace](dimmed white) '

[custom.direnv]
command = 'echo ´ôô'
when = ''' test -n "$DIRENV_DIR" '''
format = '[$output ](bold green)'

[custom.mise]
command = 'echo ´äá'
when = ''' test -n "$MISE_ENV" '''
format = '[$output ](bold green)'

[custom.upterm]
when = ''' test -n "$UPTERM_ADMIN_SOCKET" '''
format = '[[¯Üæ](bold red) upterm](bold blue) '

[custom.hermes]
command = 'echo $INST'
symbol = '¾▒â¥'
when = ''' test -n "$INST" '''
format = '[$symbol ](bold blue)[$output ](dimmed white)'

[custom.k8shome]
command = ''' kubectl config view --minify --output 'jsonpath={..namespace}' '''
symbol = '¾▒â¥'
when = ''' [ "$KUBECONFIG" = "$HOMELAB_DIR/.secret/kubeconfig" ] '''
format = '[$symbol ](bold blue)[$output ](dimmed white)'
