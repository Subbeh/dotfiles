"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
continuation_prompt = '[вқҜвқҜ](dimmed white) '
command_timeout = 1000

format = """
$hostname\
$directory\
${custom.direnv}\
${custom.mise}\
${custom.upterm}\
$character\
"""

right_format = """
$cmd_duration\
${custom.hermes}\
${custom.k8shome}\
$sudo\
$jobs\
$git_branch\
$git_state\
$golang\
$python\
"""

[directory]
truncate_to_repo = false
# repo_root_style = 'bold bright-blue'
# repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path](blue)[$read_only]($read_only_style) '
truncation_length = 8
truncation_symbol = '+/'
style = 'bold bright-blue'
format = '[$truncation_symbol](bold bright-purple)[$path](bold bright-blue)[$read_only]($read_only_style) '
read_only = ' у°Ңҫ'

[directory.substitutions]
'~/.config/' = '[оҳ•] '
'~/.config' = '[оҳ•]'
'~/workspace/chezmoi/dotfiles/' = '[у°Үҳ] '
'~/workspace/chezmoi/dotfiles' = '[у°Үҳ]'
'~/workspace/' = '[уұ§Ҫ] '
'~/workspace' = '[уұ§Ҫ]'
'~/' = '[пҖ•] '
'~' = '[пҖ•]'
'/data/workspace/chezmoi/dotfiles/' = '[у°Үҳ] '
'/data/workspace/chezmoi/dotfiles' = '[у°Үҳ]'
'/data/workspace/' = '[уұ§Ҫ] '
'/data/workspace' = '[уұ§Ҫ]'
'/data/' = '[п‘І] '
'/data' = '[п‘І]'

[character]
success_symbol = '[вқҜ](bold purple)'
error_symbol = '[вқҜ](bold red)'

[cmd_duration]
format = '[[у°”ҹ](bold yellow) $duration ](dimmed white)'

[git_branch]
format = '[[$symbol](bold cyan) $branch(:$remote_branch)](dimmed white) '
symbol = "пҗҳ"

[git_status]
style = 'dimmed white'
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
deleted = 'x'

[aws]
format = '[[$symbol](bold bright-blue) $profile](dimmed white) '
style = 'bold blue'
symbol = 'пғӮ'

[golang]
format = '[оҳ§ ](sapphire)'

[hostname]
ssh_symbol = '\[о¬Ғ\] '
style = 'bright-blue'
format = '[$ssh_symbol$hostname]($style)[ вқҜ](bold purple) '

[python]
format = '[[оҲө](bold yellow) $virtualenv](dimmed white) '

[kubernetes]
symbol = 'о қ'
disabled = false
detect_env_vars = ['KUBECONFIG']
detect_files = ['dummy']
format = '[[$symbol](bold bright-blue)$namespace](dimmed white) '

[custom.direnv]
command = 'echo п““'
when = ''' test -n "$DIRENV_DIR" '''
format = '[$output ](bold green)'

[custom.mise]
command = 'echo п„ '
when = ''' test -n "$MISE_ENV" '''
format = '[$output ](bold green)'

[custom.upterm]
when = ''' test -n "$UPTERM_ADMIN_SOCKET" '''
format = '[[оҡ‘](bold red) upterm](bold blue) '

[custom.hermes]
command = 'echo $INST'
symbol = 'уұғҫ'
when = ''' test -n "$INST" '''
format = '[$symbol ](bold blue)[$output ](dimmed white)'

[custom.k8shome]
command = ''' kubectl config view --minify --output 'jsonpath={..namespace}' '''
symbol = 'уұғҫ'
when = ''' [ "$KUBECONFIG" = "$HOMELAB_DIR/.secret/kubeconfig" ] '''
format = '[$symbol ](bold blue)[$output ](dimmed white)'

