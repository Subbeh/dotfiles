conky.config = {
    background = false,
    border_inner_margin = 4,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'white',
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = true,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    xftfont = '123:size=8',
    xftalpha = 0.1,
    total_run_times = 0,
    default_color = 'grey',
    stippled_borders = 3,
    text_buffer_size = 256,

    alignment = 'top_left',
    gap_x = -1880,
    gap_y = 25,
    border_width = 5,
    --font = 'FuraCode Nerd Font Mono:size=10',
    own_window = true,
    own_window_transparent = false,
    own_window_argb_visual = true,
    own_window_argb_value = 90,
    own_window_type = 'dock',
    update_interval = 1.0,
    double_buffer = true,
}

conky.text = [[
  ${font Arial:bold:size=15}${color #3b71a1}${color #3b71a1}XPS ${color #3b71a1} ${hr 2}
  $font${color DimGray}$sysname $kernel $alignr $machine
  Date $alignr${time %A, %B %e}
  Time $alignr${time %H:%M:%S}
  Uptime $alignr${uptime_short}
  File System $alignr${fs_type}

  ${font Arial:bold:size=15}${color #3b71a1}NETWORK ${color #3b71a1}${hr 2}
  $font${color DimGray}Up $alignr ${upspeed wlp2s0}
  ${color DimGray}${upspeedgraph wlp2s0 20,500 DimGray DimGray}
  ${color DimGray}Down $alignr ${downspeed wlp2s0}
  ${color DimGray}${downspeedgraph wlp2s0 20,500 DimGray DimGray}
  ${color DimGray}Uploaded: $alignr ${totalup wlp2s0} Downloaded: $alignr ${totaldown wlp2s0}

  ${font Arial:bold:size=15}${color #3b71a1}PROCESSORS ${color #3b71a1}${hr 2}
  $font${color DimGray}Core1 ${cpu cpu1}% $alignr ${cpubar cpu1 6,380} $alignr ${execi 2 sensors | grep 'Core 0' | cut -c 16-23}
  Core2 ${cpu cpu2}% $alignr ${cpubar cpu2 6,380} $alignr ${execi 2 sensors | grep 'Core 1' | cut -c 16-23}
  Core3 ${cpu cpu3}% $alignr ${cpubar cpu3 6,380} $alignr ${execi 2 sensors | grep 'Core 2' | cut -c 16-23}
  Core4 ${cpu cpu4}% $alignr ${cpubar cpu4 6,380} $alignr ${execi 2 sensors | grep 'Core 3' | cut -c 16-23}
  Core5 ${cpu cpu5}% $alignr ${cpubar cpu5 6,422}
  Core6 ${cpu cpu6}% $alignr ${cpubar cpu6 6,422}
  Core7 ${cpu cpu7}% $alignr ${cpubar cpu7 6,422}
  Core8 ${cpu cpu8}% $alignr ${cpubar cpu8 6,422}

  i8k temp: ${i8k_cpu_temp}°C $alignr fans: ${i8k_left_fan_status} / ${i8k_right_fan_status}

  ${font Arial:bold:size=15}${color #3b71a1}MEMORY ${color #3b71a1}${hr 2}
  $font${color DimGray}MEM $alignc $mem / $memmax $alignr $memperc%
  $membar
  ${font Arial:bold:size=15}${color #3b71a1}HDD ${color #3b71a1}${hr 2}
  $font${color DimGray}/ $alignc ${fs_used /} / ${fs_size /} $alignr ${fs_free_perc /}%
  ${fs_bar /}
  $font${color DimGray}/home $alignc ${fs_used /home} / ${fs_size /home} $alignr ${fs_free_perc /home}%
  ${fs_bar /home}
  $font${color DimGray}/data $alignc ${fs_used /data} / ${fs_size /data} $alignr ${fs_free_perc /data}%
  ${fs_bar /data}
  ${color #3b71a1}Disk I/O: $color${diskio}
  ${color DimGray}Read:
  ${color DimGray}${diskiograph_read 20,500 DimGray DimGray 750}
  ${color DimGray}Write:
  ${color DimGray}${diskiograph_write 20,500 DimGray DimGray 750}
  ${color #3b71a1}Swap Usage:$color $swap${color DimGray}/${color}$swapmax - $swapperc% ${color DimGray}${swapbar}

  ${color #3b71a1}Entropy: ${color}${entropy_avail}${color DimGray}/${color}${entropy_poolsize} ${color DimGray}${entropy_bar}

  ${font Arial:bold:size=15}${color #3b71a1}PROCESSES ${color #3b71a1}${hr 2}
  $font${color #3b71a1}Total: ${color}$alignr${processes}
  ${color DimGray}$font${top_mem name 1}${alignr}${top_mem mem 1} %
  $font${top_mem name 2}${alignr}${top_mem mem 2} %
  $font${top_mem name 3}${alignr}${top_mem mem 3} %
  $font${top_mem name 4}${alignr}${top_mem mem 4} %
  $font${top_mem name 5}${alignr}${top_mem mem 5} %
]]
